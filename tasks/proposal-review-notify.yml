schedule: "*/15 * * * *"
enabled: true
timeoutMs: 300000
name: proposal-review-notify
description: "Every 15 minutes: check for pending proposals and send one OS notification when review is needed."
when_to_use: "Use when the stash should check every 15 minutes for pending proposals and send one OS notification when review is needed."
tags:
  - scheduled
  - proposals
  - notification
updated: 2026-05-24
prompt: |
  Check whether this stash has pending proposals that need review.

  1. Run `akm proposals --status pending --format json`.
  2. If the result has `totalCount: 0`, exit quietly with a one-line summary and
     do not send a notification.
  3. If one or more proposals are pending, send a local OS notification using
     whichever notifier is available on the host. Try platform defaults first,
     then a cross-platform fallback:
     - Linux: `notify-send "AKM proposals pending" "<count> proposal(s) need review in $(pwd). Run: akm proposals"`
     - macOS: `osascript -e 'display notification "<count> proposal(s) need review in $(pwd). Run: akm proposals" with title "AKM proposals pending"'`
     - Cross-platform (if installed): `apprise -t "AKM proposals pending" -b "<count> proposal(s) need review in $(pwd). Run: akm proposals"`
       (apprise reads its own config from `$APPRISE_CONFIG`, `~/.config/apprise/`, or `~/.apprise` — do not hardcode a path.)
     Agents may adapt this list to the host's available notifiers (e.g. Windows
     `BurntToast`, custom webhooks via apprise).
  4. If none of those notification commands exist, report that proposals are
     pending and that no supported notifier was available.
  5. Do not accept or reject proposals automatically.

  Finish with a concise summary that states the pending proposal count and which
  notification method was used, if any.
